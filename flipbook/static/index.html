<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>My Booklet</title>
  <link rel="stylesheet" href="/static/brand.css" />
</head>
<body>
  <div class="sheet">
    <header class="masthead">
      <p class="masthead__over">
        <span class="reg-strip" aria-hidden="true">
          <span class="c"></span><span class="m"></span><span class="y"></span><span class="k"></span>
        </span>
        <span>Est. on paper · Read on screen</span>
      </p>
      <h1 class="masthead__title">My Booklet</h1>
      <p class="dateline" id="dateline"></p>
      <hr class="rule" />
    </header>

    <main>
      <p class="eyebrow">On the rack</p>
      <ul class="plate-grid" id="schools"></ul>
      <p class="status" id="status">Loading papers…</p>
    </main>

    <footer class="sheet-foot">
      <span class="reg-strip" aria-hidden="true">
        <span class="c"></span><span class="m"></span><span class="y"></span><span class="k"></span>
      </span>
      <span>Pick a paper to read its editions</span>
    </footer>
  </div>

  <script>
    // Dateline in the classic newspaper style.
    document.getElementById('dateline').textContent =
      new Date().toLocaleDateString('en-US',
        { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    const listEl = document.getElementById('schools');
    const statusEl = document.getElementById('status');

    fetch('/api/schools')
      .then((res) => res.json())
      .then((schools) => {
        if (!schools.length) {
          statusEl.textContent = 'No papers on the rack yet.';
          return;
        }
        statusEl.textContent = '';
        for (const s of schools) {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.className = 'plate';
          a.href = `/${s.slug}`;

          const name = document.createElement('p');
          name.className = 'plate__name';
          name.textContent = s.name;

          const meta = document.createElement('p');
          meta.className = 'plate__meta';
          meta.textContent = 'Read editions →';

          a.appendChild(name);
          a.appendChild(meta);
          li.appendChild(a);
          listEl.appendChild(li);
        }
      })
      .catch((err) => {
        statusEl.className = 'status status--error';
        statusEl.textContent = 'Could not load papers. Try refreshing.';
        console.error(err);
      });
  </script>
</body>
</html>
